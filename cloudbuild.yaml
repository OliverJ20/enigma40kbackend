# ──────────────────────────────────────────────────────────────
# Google Cloud Build pipeline.
# Builds the Docker image, pushes to Artifact Registry, and deploys
# to Cloud Run.
#
# Triggered via:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_REPO=dossier,_SERVICE=wh40k-lists-backend
# ──────────────────────────────────────────────────────────────

substitutions:
  _REGION: us-central1
  _REPO: dossier
  _SERVICE: wh40k-lists-backend

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest"

steps:
  # ── Build ──
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest
      - --cache-from=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest
      - .

  # ── Push ──
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}

  # ── Deploy to Cloud Run ──
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --concurrency=80
      - --timeout=60s
      - --set-env-vars=NODE_ENV=production
      # Sensitive values come from Secret Manager — wire these up once
      # in `gcloud secrets create` then reference them here:
      - --update-secrets=DATABASE_URL=DATABASE_URL:latest,BETTER_AUTH_SECRET=BETTER_AUTH_SECRET:latest,GITHUB_CLIENT_ID=GITHUB_CLIENT_ID:latest,GITHUB_CLIENT_SECRET=GITHUB_CLIENT_SECRET:latest
      # Public-but-environment-specific values can be plain env vars.
      # Override these via `--substitutions` or edit before deploying:
      - --update-env-vars=BETTER_AUTH_URL=https://api.dossier.example.com,CORS_ORIGINS=https://dossier.example.com
